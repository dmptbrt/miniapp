<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://s3.tradingview.com/tv.js"></script>

<script>
if (
    !window.Telegram ||
    !Telegram.WebApp ||
    !Telegram.WebApp.initData ||
    Telegram.WebApp.initData.length === 0
) {
    document.body.innerHTML = "<h2 style='color:white;text-align:center;margin-top:50px;'>⛔ Открывай только через Telegram</h2>";
    throw new Error("No Telegram access");
}
</script>

<style>
body {
    margin: 0;
    background: linear-gradient(180deg, #0b1220, #0f172a);
    font-family: 'Inter', sans-serif;
    color: white;
}

/* контейнер */
.container {
    max-width: 420px;
    margin: 0 auto;
    padding: 16px;
}

/* заголовок */
h2 {
    text-align: center;
    font-size: 20px;
    margin-bottom: 15px;
}

/* график */
#tv_chart {
    width: 100%;
    height: 220px;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 15px;
}

/* селекты */
select {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border-radius: 14px;
    border: 1px solid #1f2937;
    background: #111827;
    color: white;
    font-size: 14px;
}

/* кнопка */
button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border-radius: 14px;
    border: none;
    font-weight: 600;
    background: linear-gradient(90deg, #22c55e, #06b6d4);
    color: white;
    font-size: 15px;
}

/* загрузка */
.loading {
    margin-top: 15px;
    text-align: center;
    opacity: 0.7;
}

/* результат */
.result {
    margin-top: 15px;
    padding: 16px;
    border-radius: 14px;
    background: rgba(30, 41, 59, 0.7);
    text-align: center;
}

.signal {
    font-size: 20px;
    font-weight: 700;
    margin-top: 10px;
}

.buy { color: #22c55e; }
.sell { color: #ef4444; }

.conf {
    margin-top: 8px;
    opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">

<h2>📊 AI Trading</h2>

<div id="tv_chart"></div>

<select id="pair" onchange="updateChart(this.value)">
    <option>OTC EUR/USD</option>
    <option>OTC GBP/USD</option>
    <option>OTC USD/JPY</option>
    <option>BTC/USD</option>
    <option>ETH/USD</option>
</select>

<select id="time">
    <option>5s</option>
    <option>15s</option>
    <option>30s</option>
    <option>1m</option>
    <option>5m</option>
</select>

<button onclick="analyze()">⚡ Получить сигнал</button>

<div id="loading" class="loading"></div>
<div id="result"></div>

</div>

<script>

function updateChart(pair) {
    let symbol = "FX:EURUSD";

    if (pair.includes("GBP")) symbol = "FX:GBPUSD";
    if (pair.includes("JPY")) symbol = "FX:USDJPY";
    if (pair.includes("BTC")) symbol = "BINANCE:BTCUSDT";
    if (pair.includes("ETH")) symbol = "BINANCE:ETHUSDT";

    document.getElementById("tv_chart").innerHTML = "";

    new TradingView.widget({
        container_id: "tv_chart",
        width: "100%",
        height: 220,
        symbol: symbol,
        interval: "1",
        theme: "dark",
        style: "1",
        hide_top_toolbar: true,
        hide_legend: true
    });
}

async function analyze() {
    const loading = document.getElementById("loading");
    const result = document.getElementById("result");

    const pair = document.getElementById("pair").value;
    const time = document.getElementById("time").value;

    result.innerHTML = "";

    loading.innerHTML = "🤖 AI анализирует...";
    await sleep(600);

    loading.innerHTML = "📊 Анализ тренда...";
    await sleep(600);

    loading.innerHTML = "🧠 Формирование сигнала...";
    await sleep(600);

    let isBuy = Math.random() > 0.4;
    let direction = isBuy ? "Покупать ↑" : "Продавать ↓";
    let cls = isBuy ? "buy" : "sell";

    let confidence = Math.floor(Math.random() * 21) + 70;

    loading.innerHTML = "";

    result.innerHTML = `
        <div class="result">
            <div>${pair} | ${time}</div>
            <div class="signal ${cls}">
                ${direction}
            </div>
            <div class="conf">
                Уверенность: <b>${confidence}%</b>
            </div>
        </div>
    `;
}

function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

updateChart("OTC EUR/USD");

</script>

</body>
</html>
