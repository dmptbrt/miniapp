<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<script>
if (
    !window.Telegram ||
    !Telegram.WebApp ||
    !Telegram.WebApp.initData ||
    Telegram.WebApp.initData.length === 0
) {
    document.body.innerHTML = "<h2 style='color:white;text-align:center;margin-top:50px;'>⛔ Доступ только через Telegram</h2>";
    throw new Error("No Telegram access");
}
</script>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body {
    background: linear-gradient(180deg, #0b1220, #0f172a);
    color: white;
    font-family: 'Inter', sans-serif;
    text-align: center;
    padding: 20px;
}

h2 {
    font-weight: 700;
    font-size: 22px;
}

select {
    width: 90%;
    padding: 14px;
    margin: 10px;
    border-radius: 14px;
    border: 1px solid #1f2937;
    background: #111827;
    color: white;
}

button {
    width: 90%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    font-weight: 600;
    background: linear-gradient(90deg, #22c55e, #06b6d4);
    color: white;
    cursor: pointer;
}

.result {
    margin-top: 20px;
    padding: 20px;
    border-radius: 16px;
    background: rgba(30, 41, 59, 0.6);
}

.buy { color: #22c55e; }
.sell { color: #ef4444; }

</style>
</head>

<body>

<h2>📊 AI Trading</h2>

<div id="tv_chart" style="height:250px; margin-bottom:15px;"></div>

<select id="pair" onchange="updateChart(this.value)">
    <option>OTC EUR/USD</option>
    <option>OTC GBP/USD</option>
    <option>OTC USD/JPY</option>
    <option>BTC/USD</option>
    <option>ETH/USD</option>
</select>

<select id="time">
    <option>5s</option>
    <option>15s</option>
    <option>30s</option>
    <option>1m</option>
    <option>5m</option>
</select>

<button onclick="analyze()">⚡ Получить сигнал</button>

<div id="loading"></div>
<div id="result"></div>

<script>

function updateChart(pair) {
    let symbol = "FX:EURUSD";

    if (pair.includes("GBP")) symbol = "FX:GBPUSD";
    if (pair.includes("JPY")) symbol = "FX:USDJPY";
    if (pair.includes("BTC")) symbol = "BINANCE:BTCUSDT";
    if (pair.includes("ETH")) symbol = "BINANCE:ETHUSDT";

    document.getElementById("tv_chart").innerHTML = "";

    new TradingView.widget({
        container_id: "tv_chart",
        width: "100%",
        height: 250,
        symbol: symbol,
        interval: "1",
        theme: "dark",
        style: "1",
        hide_top_toolbar: true,
        hide_legend: true
    });
}

async function analyze() {
    const loading = document.getElementById("loading");
    const result = document.getElementById("result");

    const pair = document.getElementById("pair").value;
    const time = document.getElementById("time").value;

    result.innerHTML = "";
    loading.innerHTML = "🤖 Анализ...";

    await sleep(800);
    loading.innerHTML = "📊 Анализ тренда...";

    await sleep(800);
    loading.innerHTML = "🧠 Формирование сигнала...";

    await sleep(800);

    let isBuy = Math.random() > 0.4;
    let direction = isBuy ? "Покупать ↑" : "Продавать ↓";
    let cls = isBuy ? "buy" : "sell";

    let confidence = Math.floor(Math.random() * 21) + 70;

    loading.innerHTML = "";

    result.innerHTML = `
        <div class="result">
            <div>${pair} | ${time}</div>
            <div class="${cls}" style="font-size:22px; margin-top:10px;">
                ${direction}
            </div>
            <div style="margin-top:10px;">
                Уверенность: <b>${confidence}%</b>
            </div>
        </div>
    `;
}

function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

// загрузка графика при старте
updateChart("OTC EUR/USD");

</script>

</body>
</html>
